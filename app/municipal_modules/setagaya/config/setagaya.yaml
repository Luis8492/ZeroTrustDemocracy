# Setagaya assembly: unified config for committee + regular sessions.
# Shared fields apply to both sessions; per-fetcher overrides go under `fetchers`.

db_path: db/setagaya.db
pii_files:
  - app/PIIs/partyNames.txt
party_table_path: app/municipal_modules/setagaya/config/name-party-table.csv

fetchers:
  SetagayaCommitteeFetcher:
    fetch_url: https://kugi.city.setagaya.tokyo.jp/voices/
    encoding: cp932
  SetagayaRegularFetcher:
    fetch_url: https://www.city.setagaya.lg.jp/gikai/index.html
    encoding: utf-8
