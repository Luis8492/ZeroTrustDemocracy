version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ztd-backend
    user: "0:0"
    entrypoint:
      - /app/scripts/docker-compose-entrypoint.sh
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./db:/app/db
      - ./app/raw_minutes:/app/app/raw_minutes
      - ./app/exports:/app/app/exports
    environment:
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8000
      - MUNICIPALITY=setagaya
      - INIT_DB_ON_START=false
      - RUN_FETCH_ON_START=false
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ztd-frontend
    ports:
      - "8001:80"
    depends_on:
      - backend
    restart: unless-stopped
