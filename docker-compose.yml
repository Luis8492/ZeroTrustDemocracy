version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ztd-backend
    entrypoint:
      - /app/scripts/docker-compose-entrypoint.sh
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./db:/app/db
      - ./app/raw_minutes:/app/app/raw_minutes
      - ./app/exports:/app/app/exports
      - ./config:/app/config
    environment:
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8000
      - MUNICIPALITY=setagaya
      - INIT_DB_ON_START=false
      - RUN_FETCH_ON_START=false
      - CONFIG_DIR=/app/config
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ztd-frontend
    ports:
      - "8001:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped
