<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-error-bars@4"></script>
    <script src="db.js" type="module"></script>
    <script src="api.js" type="module"></script>
    <script src="stats.js" type="module"></script>
    <title>Result</title>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
    </nav>
    <h1>評価結果</h1>
    <div id="results"></div>
    <div>
        <button id="export-csv">CSVエクスポート</button>
    </div>
    <div>
        <label for="import-csv">CSVインポート(CSVファイル選択)</label>
        <input type="file" id="import-csv" accept=".csv">
        <button id="import-btn">CSVインポート</button>
    </div>
    <canvas id="questioner-chart" width="800" height="400"></canvas>
    <canvas id="party-chart" width="800" height="400"></canvas>
    <div id="filters">
        <label for="filter-questioner">議員:</label>
        <select id="filter-questioner">
            <option value="">すべて</option>
        </select>
        <label for="filter-party">政党:</label>
        <select id="filter-party">
            <option value="">すべて</option>
        </select>
    </div>
    <div id="qa-list"></div>

    <script type="module">
    import { fetchMetaData } from './api.js';
    import { listEvaluations, saveEvaluation } from './db.js';
    import { computeGroupedStats } from './stats.js';

    const MUNICIPALITY = "setagaya";

    async function showResults() {
        const evaluations = await listEvaluations();
        if (evaluations.length === 0) {
            document.getElementById('results').innerText = '評価がありません';
            return;
        }
        document.getElementById('results').innerText = `回答数: ${evaluations.length}`;
        const ids = evaluations.map(e => e.QA_id);
        const metas = await fetchMetaData(ids, MUNICIPALITY);
        const evalMap = new Map(evaluations.map(e => [e.QA_id, e.eval]));
        const questionerStats = computeGroupedStats(
            metas,
            meta => evalMap.get(meta.id),
            meta => meta.questioner
        );
        renderChart(questionerStats, 'questioner-chart', '議員別平均評価');

        const partyStats = computeGroupedStats(
            metas.filter(m => m.questioner_party),
            meta => evalMap.get(meta.id),
            meta => meta.questioner_party
        );
        renderChart(partyStats, 'party-chart', '政党別平均評価');

        const allData = metas.map(meta => ({ ...meta, eval: evalMap.get(meta.id) }));
        setupFilters(allData);
        renderQAList(allData);
    }

    function renderChart(stats, canvasId, label) {
        const labels = stats.map(s => `${s.key} (回答数: ${s.count})`);
        const data = stats.map(s => ({ y: s.mean, yMin: s.mean - s.std, yMax: s.mean + s.std, count: s.count }));
        const ctx = document.getElementById(canvasId).getContext('2d');
        new Chart(ctx, {
            type: 'barWithErrorBars',
            data: {
                labels,
                datasets: [{
                    label,
                    data,
                    backgroundColor: 'rgba(75, 192, 192, 0.5)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const { y, count } = context.raw;
                                return `${context.dataset.label}: ${y.toFixed(2)} (回答数: ${count})`;
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        suggestedMin: -3,
                        suggestedMax: 3
                    }
                }
            }
        });
    }

    function setupFilters(data) {
        const qSel = document.getElementById('filter-questioner');
        const pSel = document.getElementById('filter-party');
        qSel.length = 1;
        pSel.length = 1;
        const questioners = [...new Set(data.map(d => d.questioner).filter(Boolean))].sort();
        questioners.forEach(q => {
            const opt = document.createElement('option');
            opt.value = q;
            opt.textContent = q;
            qSel.appendChild(opt);
        });
        const parties = [...new Set(data.map(d => d.questioner_party).filter(Boolean))].sort();
        parties.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p;
            opt.textContent = p;
            pSel.appendChild(opt);
        });
        qSel.addEventListener('change', () => renderQAList(data));
        pSel.addEventListener('change', () => renderQAList(data));
    }

    function renderQAList(data) {
        const qValue = document.getElementById('filter-questioner').value;
        const pValue = document.getElementById('filter-party').value;
        const filtered = data.filter(d =>
            (qValue === '' || d.questioner === qValue) &&
            (pValue === '' || d.questioner_party === pValue)
        );
        const container = document.getElementById('qa-list');
        container.innerHTML = '';
        if (filtered.length === 0) {
            container.textContent = '該当するQAがありません';
            return;
        }
        filtered.forEach(item => {
            const table = document.createElement('table');
            table.style.borderCollapse = 'collapse';
            table.style.border = '1px solid black';
            table.style.marginBottom = '1em';

            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            ['項目', '内容'].forEach(h => {
                const th = document.createElement('th');
                th.textContent = h;
                th.style.border = '1px solid black';
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');

            function addRow(label, value) {
                const tr = document.createElement('tr');
                const tdLabel = document.createElement('td');
                tdLabel.textContent = label;
                tdLabel.style.border = '1px solid black';
                const tdValue = document.createElement('td');
                if (value instanceof HTMLElement) {
                    tdValue.appendChild(value);
                } else {
                    tdValue.textContent = value;
                }
                tdValue.style.border = '1px solid black';
                tr.appendChild(tdLabel);
                tr.appendChild(tdValue);
                tbody.appendChild(tr);
            }

            addRow('議員', item.questioner || '');
            addRow('政党', item.questioner_party || '');

            const qaContainer = document.createElement('div');
            item.QA.forEach(q => {
                const div = document.createElement('div');
                div.textContent = (q.mark ? q.mark : '') + q.comment;
                qaContainer.appendChild(div);
            });
            addRow('QA', qaContainer);

            table.appendChild(tbody);
            container.appendChild(table);
        });
    }

    document.getElementById('export-csv').addEventListener('click', exportCSV);
    document.getElementById('import-btn').addEventListener('click', importCSV);
    document.addEventListener('DOMContentLoaded', showResults);

    window.fetchMetaData = (ids) => fetchMetaData(ids, MUNICIPALITY);

    async function exportCSV() {
        const evaluations = await listEvaluations();
        if (evaluations.length === 0) {
            return;
        }
        const header = 'QA_id,eval\n';
        const rows = evaluations.map(e => `${e.QA_id},${e.eval}`).join('\n');
        const csv = header + rows;
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'evaluations.csv';
        a.click();
        URL.revokeObjectURL(url);
    }

    async function importCSV() {
        const input = document.getElementById('import-csv');
        if (input.files.length === 0) {
            return;
        }
        const text = await input.files[0].text();
        const lines = text.trim().split(/\r?\n/).slice(1); // Skip header
        for (const line of lines) {
            const [QA_id, evalStr] = line.split(',');
            if (QA_id) {
                const evalNum = parseFloat(evalStr);
                await saveEvaluation({ QA_id, eval: evalNum });
            }
        }
        showResults();
    }
    </script>
</body>
</html>
