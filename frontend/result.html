<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-error-bars@4"></script>
    <script src="db.js" type="module"></script>
    <script src="api.js" type="module"></script>
    <script src="stats.js" type="module"></script>
    <title>Result</title>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
    </nav>
    <h1>評価結果</h1>
    <div id="results"></div>
    <canvas id="questioner-chart" width="800" height="400"></canvas>
    <canvas id="party-chart" width="800" height="400"></canvas>

    <script type="module">
    import { fetchMetaData } from './api.js';
    import { listEvaluations } from './db.js';
    import { computeGroupedStats } from './stats.js';

    async function showResults() {
        const evaluations = await listEvaluations();
        if (evaluations.length === 0) {
            document.getElementById('results').innerText = '評価がありません';
            return;
        }
        const ids = evaluations.map(e => e.QA_id);
        const metas = await fetchMetaData(ids);
        const evalMap = new Map(evaluations.map(e => [e.QA_id, e.eval]));
        const questionerStats = computeGroupedStats(
            metas,
            meta => evalMap.get(meta.id),
            meta => meta.questioner_party
        );
        renderChart(questionerStats, 'questioner-chart', '議員別平均評価');

        const partyStats = computeGroupedStats(
            metas.filter(m => m.questioner_party),
            meta => evalMap.get(meta.id),
            meta => meta.questioner_party
        );
        renderChart(partyStats, 'party-chart', '政党別平均評価');
    }

    function renderChart(stats, canvasId, label) {
        const labels = stats.map(s => s.key);
        const data = stats.map(s => ({ y: s.mean, yMin: s.mean - s.std, yMax: s.mean + s.std }));
        const ctx = document.getElementById(canvasId).getContext('2d');
        new Chart(ctx, {
            type: 'barWithErrorBars',
            data: {
                labels,
                datasets: [{
                    label,
                    data,
                    backgroundColor: 'rgba(75, 192, 192, 0.5)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true,
                        suggestedMin: -3,
                        suggestedMax: 3
                    }
                }
            }
        });
    }

    document.addEventListener('DOMContentLoaded', showResults);
    </script>
</body>
</html>
