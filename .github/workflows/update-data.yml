name: Update assembly data

on:
  schedule:
    # 毎週月曜 03:00 JST (= 日曜 18:00 UTC)
    - cron: '0 18 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Initialize DB schema (idempotent)
        run: python scripts/init_db.py setagaya

      - name: Fetch new minutes
        env:
          FETCHER_HEADLESS: '1'
        run: python app/fetch.py --municipality setagaya

      - name: Analyze minutes
        run: python app/minute_analyzer.py --municipality setagaya

      - name: Export static JSON
        run: python scripts/export_static_data.py

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add db/setagaya.db frontend/public/data
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): weekly minutes update"
            git push
          fi
