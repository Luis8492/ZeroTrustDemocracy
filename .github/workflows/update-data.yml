name: Update assembly data

on:
  schedule:
    # 毎週月曜 03:00 JST (= 日曜 18:00 UTC)
    - cron: '0 18 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Initialize DB schema (idempotent)
        run: python scripts/init_db.py setagaya

      - name: Fetch new minutes
        env:
          FETCHER_HEADLESS: '1'
        run: python app/fetch.py --municipality setagaya

      - name: Analyze minutes
        run: python app/minute_analyzer.py --municipality setagaya

      - name: Export static JSON
        run: python scripts/export_static_data.py

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add db/setagaya.db frontend/public/data
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): weekly minutes update"
            git push
          fi

      # 失敗時に Issue を自動起票して気付けるようにする。
      # 既に同じラベルの open issue があればコメントを追記し、なければ新規作成。
      - name: Open / update failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'workflow-failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[update-data] weekly run failed (${new Date().toISOString().slice(0,10)})`;
            const body = [
              `週次の \`update-data\` ワークフローが失敗しました。`,
              ``,
              `- Run: ${runUrl}`,
              `- Commit: \`${context.sha}\``,
              `- Trigger: \`${context.eventName}\``,
              ``,
              `Actions タブからログを確認してください。`,
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });

            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Another failure on ${new Date().toISOString()}\n\n${body}`,
              });
              core.info(`Appended comment to #${issue.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
              core.info(`Opened issue #${created.data.number}`);
            }
