name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python deps
        # pytest is a dev-only dep; keep it out of requirements.txt so production
        # / Cloudflare Pages builds don't pull it in.
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        run: python -m pytest -v
